repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: mixed-line-ending
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(pytorch|mlx)/
      - id: ruff-format
        files: ^(pytorch|mlx)/
  - repo: local
    hooks:
      - id: dprint
        name: dprint fmt (markdown + toml)
        entry: dprint fmt
        language: system
        pass_filenames: false
      - id: cargo-fmt
        name: cargo fmt (rust)
        entry: bash -c 'cd rust && cargo fmt'
        language: system
        files: ^rust/.*\.rs$
        pass_filenames: false
      - id: cargo-clippy
        name: cargo clippy (rust lib + tests)
        entry: bash -c 'cd rust && cargo clippy --lib --tests --no-deps -- -D warnings'
        language: system
        files: ^rust/.*\.rs$
        pass_filenames: false
