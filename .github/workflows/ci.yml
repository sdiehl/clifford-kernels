name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pytorch
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - run: uv sync --no-install-project
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  python-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pytorch
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          python-version: ${{ matrix.python }}
      - run: uv sync
      - run: uv run pytest -q

  python-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pytorch
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: pytorch/dist/

  mlx-lint:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mlx
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - run: uv sync --no-install-project
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  mlx-test:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: mlx
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          python-version: ${{ matrix.python }}
      - run: uv sync
      - run: uv run pytest -q

  rust-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
      - run: cargo fmt --check
      - run: cargo test --lib --tests

  rust-build:
    runs-on: ubuntu-latest
    needs: rust-test
    defaults:
      run:
        working-directory: rust
    env:
      CUDA_OXIDE_LLC: /usr/bin/llc-21
    steps:
      - uses: actions/checkout@v6

      - name: Install LLVM 21 and Clang 21
        run: |
          sudo apt-get update
          sudo apt-get install -y lsb-release wget software-properties-common gnupg
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21
          sudo apt-get install -y llvm-21 libclang-21-dev libclang-cpp21-dev libclang-common-21-dev
          sudo update-alternatives --install /usr/bin/clang   clang   /usr/bin/clang-21   100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-21 100

      - name: Install CUDA Toolkit 12
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: '12.5.0'
          method: 'network'
          sub-packages: '["nvcc", "cudart"]'

      - name: Install pinned nightly toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-04-03
          components: rust-src, rustc-dev, rust-analyzer, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust -> target
          key: cuda-oxide-build

      - name: Install cargo-oxide
        run: cargo install --git https://github.com/NVlabs/cuda-oxide.git --rev 76a1d8840e5360207943805d036d8e299bda7728 cargo-oxide

      - name: Set up libcuda driver stub
        run: |
          sudo ln -sf "$CUDA_PATH/lib64/stubs/libcuda.so" "$CUDA_PATH/lib64/stubs/libcuda.so.1"
          echo "LD_LIBRARY_PATH=$CUDA_PATH/lib64/stubs:$LD_LIBRARY_PATH" >> "$GITHUB_ENV"

      - name: cargo oxide build
        run: cargo oxide build --features gpu
